services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: symposium
      POSTGRES_USER: symposium
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    # Port 5432 is NOT exposed by default — the orchestrator runs alongside the
    # backend on the VPS and reaches the DB over the Docker network. Uncomment
    # the ports mapping only if you're running the orchestrator off-box (e.g.
    # the Ollama fallback path with docker-compose.orchestrator.yml on a NAS),
    # and firewall 5432 to that host.
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U symposium"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    environment:
      DATABASE_URL: postgres://symposium:${POSTGRES_PASSWORD}@db:5432/symposium?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator.Dockerfile
    environment:
      DATABASE_URL: postgres://symposium:${POSTGRES_PASSWORD}@db:5432/symposium?sslmode=disable
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
