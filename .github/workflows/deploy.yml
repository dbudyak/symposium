name: Deploy Symposium

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.23'

      - name: Test backend
        working-directory: ./backend
        run: go build ./...

      - name: Test orchestrator
        working-directory: ./orchestrator
        run: go build ./...

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

  deploy:
    name: Deploy to UpCloud
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Sync files to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.env' --exclude='node_modules' --exclude='.git'
          path: ./
          remote_path: /opt/symposium/
          remote_host: ${{ secrets.UPCLOUD_HOST }}
          remote_user: ${{ secrets.UPCLOUD_USER }}
          remote_key: ${{ secrets.UPCLOUD_SSH_KEY }}

      - name: Rebuild and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.UPCLOUD_HOST }}
          username: ${{ secrets.UPCLOUD_USER }}
          key: ${{ secrets.UPCLOUD_SSH_KEY }}
          # 30m ceiling — a cold Go build on the 1 GB VPS can take >10m and
          # the action's default 10m cap silently kills it mid-compile.
          command_timeout: 30m
          script: |
            cd /opt/symposium
            # Free RAM before building. On a 1 GB box the Go compiler needs
            # several hundred MB and will swap-thrash past usability if the
            # backend/caddy/orchestrator containers are still resident. This
            # causes a brief deploy-time blip, but it prevents wedging the box.
            docker compose stop backend caddy orchestrator 2>/dev/null || true
            # Sequential builds — parallel builds OOM on 1 GB RAM.
            docker compose build backend
            docker compose build orchestrator
            docker compose build caddy
            docker compose up -d
            docker image prune -f
            echo "Deployed successfully"

      - name: Health check
        run: |
          sleep 10
          curl -f https://symposium.kodatek.app/api/status || exit 1
